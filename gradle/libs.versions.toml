# This file was generated by the Gradle 'init' task.
# https://docs.gradle.org/current/userguide/version_catalogs.html#sec::toml-dependencies-format

[versions]
lombok = "1.18.42"
junit = "6.0.2"
assertj = "3.11.1"
mockito = "5.+"
springboot = "4.0.2"

[libraries]
lombok =                   { module = "org.projectlombok:lombok",                                   version.ref = "lombok"     }
junit =                    { module = "org.junit.jupiter:junit-jupiter",                            version.ref = "junit"      }
junit-platform =           { module = "org.junit.platform:junit-platform-launcher",                 version.ref = "junit"      }
assertj =                  { module = "org.assertj:assertj-core",                                   version.ref = "assertj"    }
mockito-core =             { module = "org.mockito:mockito-core",                                   version.ref = "mockito"    }
mockito-junit =            { module = "org.mockito:mockito-junit-jupiter",                          version.ref = "mockito"    }
springboot-webmvc =        { module = "org.springframework.boot:spring-boot-starter-webmvc",        version.ref = "springboot" }
springboot-security =      { module = "org.springframework.boot:spring-boot-starter-security",      version.ref = "springboot" }
springboot-test =          { module = "org.springframework.boot:spring-boot-starter-test",          version.ref = "springboot" }
springboot-webmvc-test =   { module = "org.springframework.boot:spring-boot-starter-webmvc-test",   version.ref = "springboot" }
springboot-security-test = { module = "org.springframework.boot:spring-boot-starter-security-test", version.ref = "springboot" }

[bundles]
mockito = ["mockito-core", "mockito-junit"]
springboot = ["springboot-webmvc", "springboot-security"]
springboottest = ["springboot-test", "springboot-webmvc-test", "springboot-security-test"]
