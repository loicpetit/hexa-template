plugins {
    id 'hexa-springboot'
    id 'org.springframework.boot'
}

base {
    archivesName = "email-console"
    version = globalVersion
}

dependencies {
    implementation project(":email:core")
    implementation project(":email:persistence")
    implementation project(":email:security")
    implementation project(":email:springboot-starter")
    implementation libs.picocli.springboot.starter
}