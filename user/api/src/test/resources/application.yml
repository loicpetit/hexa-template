      password: "{noop}userPwd"
      authorities: USER,USER_CREATE
    - login: userUpdate
      password: "{noop}userPwd"
      authorities: USER,USER_UPDATE
    - login: userDelete
      password: "{noop}userPwd"
      authorities: USER,USER_DELETE

