apicache:
  external:
    emails:
      host: http://localhost:8010
      mapping: /api/emails
    users:
      host: http://localhost:8020
      mapping: /api/users
  properties:
    maximum-size: 1000
    expire-after-write-minutes: 60
    refresh-after-write-minutes: 1

server:
  port: 8040

spring:
  application:
    name: api-cache
